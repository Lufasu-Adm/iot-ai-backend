services:
  # 1. MQTT Broker: Pintu masuk data dari sensor IoT
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - iot_network

  # 2. Message Queue: Menampung antrean data untuk Worker AI nanti
  redis:
    image: redis:7-alpine
    container_name: iot_redis
    ports:
      - "6379:6379"
    networks:
      - iot_network

  # 3. Time-Series Database: Penyimpanan data sensor
  influxdb:
    image: influxdb:2
    container_name: iot_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword123
      - DOCKER_INFLUXDB_INIT_ORG=iot_org
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-admin-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - iot_network

  # 4. Backend Collector: Menangkap data MQTT dan simpan ke InfluxDB
  backend:
    build: ./backend
    container_name: iot_backend
    restart: always
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - iot_network

  # 5. Worker AI: Mengambil data dari Redis dan deteksi anomali
  worker:
    build: ./worker
    container_name: iot_worker
    restart: always
    depends_on:
      - redis
    networks:
      - iot_network

  # 6. Dashboard Visual: Menampilkan grafik data dari InfluxDB
  grafana:
    image: grafana/grafana:latest
    container_name: iot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=adminpassword123
    depends_on:
      - influxdb
    networks:
      - iot_network

# Deklarasi Volume & Network Global
volumes:
  influxdb_data:

networks:
  iot_network:
    driver: bridge